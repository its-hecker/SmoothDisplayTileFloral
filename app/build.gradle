plugins {
    id 'com.android.application'
}

android {
    namespace 'com.hecker.smoothdisplaytile'
    compileSdk 34

    defaultConfig {
        applicationId "com.hecker.smoothdisplaytile"
        minSdk 29
        targetSdk 34
        versionCode 3
        versionName "1.2"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // No external deps needed — only android.service.quicksettings from SDK
}
